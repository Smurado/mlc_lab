name: Run Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Cross-Compiler and QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-aarch64-linux-gnu qemu-user

    - name: Build and Test all weekN folders
      run: |
        set -e
        # Alle Ordner der Form weekN mit main.cpp + functions.s automatisch einsammeln
        shopt -s nullglob
        for dir in week*/; do
          week="${dir%/}"
          if [[ -f "$week/main.cpp" && -f "$week/functions.s" ]]; then
            echo "::group::Build $week"
            aarch64-linux-gnu-g++ -g -Wall -Wextra -Werror \
              "$week/main.cpp" "$week/functions.s" -o "$week/test_run"
            echo "::endgroup::"

            echo "::group::Test $week (Benchmarks werden in CI uebersprungen)"
            # Benchmarks haben *_bench Tags und sind unter QEMU zu langsam
            qemu-aarch64 -L /usr/aarch64-linux-gnu "./$week/test_run" \
              "~[fmadd_bench]" "~[fmla4s_bench]" "~[fmla2s_bench]" \
              "~[perm_bench]" "~[perm_print]" "~[micro_benchmark_bench]"
            echo "::endgroup::"
          fi
        done
